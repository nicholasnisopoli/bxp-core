syntax = "proto3";
package benchmark;

service BenchmarkService {
  rpc Fetch (BenchmarkRequest) returns (BenchmarkResponse);
}

enum Action {
  FETCH = 0;
  PUSH = 1;
}

message BenchmarkRequest {
  uint32 req_id = 1;
  Action action = 2;
  string resource_uri = 3;
}

message BenchmarkResponse {
  uint32 req_id = 1;
  uint32 status_code = 2;
}